naftiko: 1.0.0-alpha2
info:
  label: Zylo Enterprise API — Import Jobs
  description: 'Zylo Enterprise API — Import Jobs. 3 operations. Lead operation: Zylo List import jobs. Self-contained Naftiko
    capability covering one Zylo business surface.'
  tags:
  - Zylo
  - Import Jobs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZYLO_API_KEY: ZYLO_API_KEY
capability:
  consumes:
  - type: http
    namespace: enterprise-import-jobs
    baseUri: https://api.zylo.com/v1
    description: Zylo Enterprise API — Import Jobs business capability. Self-contained, no shared references.
    resources:
    - name: subscriptions-subscriptionId-importJob
      path: /subscriptions/{subscriptionId}/importJob
      operations:
      - name: listimportjobs
        method: GET
        description: Zylo List import jobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          description: The unique identifier of the subscription.
          required: true
        - name: pageSize
          in: query
          type: integer
          description: The maximum number of results to return per page.
        - name: pageToken
          in: query
          type: string
          description: A token returned from a previous list request to retrieve the next page of results.
      - name: createimportjob
        method: POST
        description: Zylo Create an import job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          description: The unique identifier of the subscription.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: subscriptions-subscriptionId-importJob-importJobId
      path: /subscriptions/{subscriptionId}/importJob/{importJobId}
      operations:
      - name: getimportjob
        method: GET
        description: Zylo Get an import job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          description: The unique identifier of the subscription.
          required: true
        - name: importJobId
          in: path
          type: string
          description: The unique identifier of the import job.
          required: true
    authentication:
      type: bearer
      token: '{{env.ZYLO_API_KEY}}'
  exposes:
  - type: rest
    namespace: enterprise-import-jobs-rest
    port: 8080
    description: REST adapter for Zylo Enterprise API — Import Jobs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/subscriptions/{subscriptionid}/importjob
      name: subscriptions-subscriptionid-importjob
      description: REST surface for subscriptions-subscriptionId-importJob.
      operations:
      - method: GET
        name: listimportjobs
        description: Zylo List import jobs
        call: enterprise-import-jobs.listimportjobs
        with:
          subscriptionId: rest.subscriptionId
          pageSize: rest.pageSize
          pageToken: rest.pageToken
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createimportjob
        description: Zylo Create an import job
        call: enterprise-import-jobs.createimportjob
        with:
          subscriptionId: rest.subscriptionId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/subscriptions/{subscriptionid}/importjob/{importjobid}
      name: subscriptions-subscriptionid-importjob-importjobid
      description: REST surface for subscriptions-subscriptionId-importJob-importJobId.
      operations:
      - method: GET
        name: getimportjob
        description: Zylo Get an import job
        call: enterprise-import-jobs.getimportjob
        with:
          subscriptionId: rest.subscriptionId
          importJobId: rest.importJobId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: enterprise-import-jobs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zylo Enterprise API — Import Jobs. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: zylo-list-import-jobs
      description: Zylo List import jobs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: enterprise-import-jobs.listimportjobs
      with:
        subscriptionId: tools.subscriptionId
        pageSize: tools.pageSize
        pageToken: tools.pageToken
      outputParameters:
      - type: object
        mapping: $.
    - name: zylo-create-import-job
      description: Zylo Create an import job
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: enterprise-import-jobs.createimportjob
      with:
        subscriptionId: tools.subscriptionId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: zylo-get-import-job
      description: Zylo Get an import job
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: enterprise-import-jobs.getimportjob
      with:
        subscriptionId: tools.subscriptionId
        importJobId: tools.importJobId
      outputParameters:
      - type: object
        mapping: $.
